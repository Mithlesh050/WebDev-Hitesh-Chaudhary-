<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body class="bg-gray-900 flex justify-center items-center min-h-screen ">
    <div class="bg-gray-700 rounded-lg p-8 shadow-2xl max-w-sm w-full">
        <h2 class="text-center text-3xl mb-4 text-white font-bold ">Login</h2>
        <form>
        <div class="mb-4">
            <input class="w-full bg-amber-50 p-1 rounded-md pl-2 focus: outline-none focus:ring-2 focus:ring-blue-500 " type="email" placeholder="Email"> 
        </div>
        <div>
            <input class="w-full bg-amber-50 p-1 pl-2 focus: outline-none focus:ring-2 focus:ring-blue-500 rounded-md " type="password" placeholder="Password"> 
        </div>
        <button class="w-full bg-blue-400 p-1 rounded-sm text-center  mt-4 cursor-pointer hover:bg-blue-500 text-white shadow-2xl " type="submit">login</button>
    </form>
</div>
</body>
</html>
