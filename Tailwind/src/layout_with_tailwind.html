<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout with Tailwind</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
    <h1 class="text-3xl font-bold flex justify-center">This is for Equal sections</h1>
    <div class="m-4 grid gap-4 sm:grid-cols-2 ">
        <div class="min-h-20 bg-amber-500 rounded-lg "></div>
        <div class="min-h-20 bg-pink-500 rounded-lg "></div>
    </div>
    <div class="m-4 grid gap-4 sm:grid-cols-3 ">
        <div class="min-h-20 bg-blue-500 rounded-lg "></div>
        <div class="min-h-20 bg-green-500 rounded-lg "></div>
        <div class="min-h-20 bg-red-500 rounded-lg "></div>
    </div>
    <h1 class="text-3xl font-bold flex justify-center">This is for UnEqual sections</h1>
    <div class="m-4 grid gap-4 sm:grid-cols-12 ">
        <div class="sm:col-span-4 min-h-20 bg-amber-500 rounded-lg"></div>
        <div class="sm:col-span-8 min-h-20 bg-pink-500 rounded-lg "></div>
    </div>
    <div class="m-4 grid gap-4 sm:grid-cols-12 ">
        <div class="sm:col-span-3 min-h-20 bg-blue-500 rounded-lg "></div>
        <div class="sm:col-span-4 min-h-20 bg-green-500 rounded-lg "></div>
        <div class="sm:col-span-5 min-h-20 bg-red-500 rounded-lg "></div>
    </div>

</body>
</html>
