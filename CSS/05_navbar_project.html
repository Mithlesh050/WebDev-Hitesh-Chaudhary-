<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nevigation Bar</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: rgb(39, 26, 26);
            color: white;
        }
        .nav-container{
            margin-bottom: 20px;
        }
        h2{
            margin-bottom: 20px;
        }
        .nav1{
            border: 1px solid white;
            border-radius: 3px;
            background-color: rgb(247, 214, 172);
        }
        .nav1 ul{
            list-style-type: none;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: space-around;
        }
        .nav1 li{
            display: inline;
        }
        .nav1 a{
            text-decoration: none;
            /* background-color: rgb(52, 117, 117); */
            color: rgb(24, 12, 12);
            margin: 0;
            padding: 2px 8px;
            border-radius: 3px;
            position: relative;
        }
        .nav1 .login-btn{
            border: none;
            background-color: rgb(112, 206, 206);
            border-radius: 5px;
            padding: 2px 7px;
            cursor: pointer;
        }
        .nav1 .login-btn:hover{
            background-color: rgb(10, 194, 194);
        }
        .nav1 a:after{
            content: "";
            position: absolute;
            height: 2px;
            width: 100%;
            bottom: 0;
            left: 0;
            background-color: rgb(48, 209, 209);
            transform: scaleX(0);
            transition: transform 0.3s ease-in-out;
        }
        .nav1 a:hover::after{
             transform: scaleX(1);
        }
        .nav2{
            background-color: azure;
            width: 200px;
            padding: 20px;
        }
        .nav2 ul{
            list-style-type: none;
            margin: 0;
            padding: 0;
        }
        .nav2 li{
            margin-bottom: 10px;
        }
        .nav2 a{
            text-decoration: none;
            color: black;
            display : block ;
            padding: 7px;
            width: 100%;
        }
        .nav2 a:hover{
            background-color: aqua;
        }
        .nav2 .login-btn{
            border: none;
            background-color: rgb(112, 206, 206);
            border-radius: 5px;
            padding: 5px;
            cursor: pointer;
            width: 100%;
        }
        .nav2 .login-btn:hover{
            background-color: rgb(10, 194, 194);
        }
        .nav3{
            background-color: rgb(219, 172, 110);
            padding: 10px;
            border-radius: 3px;
        }
        .nav3 ul{
            list-style-type: none;
            margin: 0;
            padding: 0; ;
            display: flex; 
            justify-content: space-around;
            align-items: center;
        }
        .nav3 a{
            text-decoration: none;
            color: black;
            padding: 10px;
            display: block;
            position: relative;
        }
        .nav3 .dropdown-content{
            display: none;
        }
        .nav3 .dropdown:hover .dropdown-content{
            display: block;
            position: absolute;
            color: black;
            background-color: rgb(219, 154, 74);
            min-width: 150px;
        }
        .nav3 .login-btn{
            border: none;
            background-color: rgb(112, 206, 206);
            border-radius: 5px;
            padding: 5px;
            cursor: pointer;
            width: 100%;
        }
        .nav3 .login-btn:hover{
            background-color: rgb(10, 194, 194);
        }
        .nav3 .dropdown-content a:hover{
            background-color: rgb(233, 225, 216);
        }
        .nav3 a:after{
            content: "";
            position: absolute;
            height: 2px;
            width: 100%;
            bottom: 0;
            left: 0;
            background-color: rgb(222, 238, 238);
            transform: scaleX(0);
            transition: transform 0.3s ease-in-out;
        }
        .nav3 a:hover::after{
             transform: scaleX(1);
        }
    </style>
</head>
<body>
    <div class="nav-container">
        <h2>Variation 01 : Horizontal with underline effect</h2>
        <nav class="nav1">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Products</a></li>
                <li><button class="login-btn">Login</button></li>
            </ul>
        </nav>
    </div>
    <div class="nav-container">
        <h2>Variation 02 : Virtical with hover effect</h2>
        <nav class="nav2">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Products</a></li>
            </ul>
            <button class="login-btn">Login</button>
        </nav>
    </div>
    <div class="nav-container">
        <h2>Variation 03 : Horizontal with dropdown</h2>
        <nav class="nav3">
            <ul>
                <li><a href="#">Home</a></li>
                <li class="dropdown">
                    <a href="#">About</a>
                    <div class="dropdown-content">
                    <a href="#">Our story</a>
                    <a href="#">Teams</a>
                    <a href="#">Contact</a>
                    </div>
                </li>
                <li><a href="#">Products</a></li>
                <li><button class="login-btn"> Login</button></li>
            </ul>
        </nav>
    </div>
</body>
</html>
