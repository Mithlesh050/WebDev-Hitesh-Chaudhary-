<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Introduction</title>
    <style>
        .grid-container{
            display: grid;
            grid-template-columns: repeat(3 , 1fr);
            grid-template-rows: repeat(5 , 50px);
        }
        .grid{
            border: 1px solid black;
            padding: 3px 10px;
            font-weight: bold;
        }
        .g1{
            grid-column: 1/3;
            grid-row: 1/3;
        }
        .g6{
            grid-row: 4/8;
        }
        .g5{
            grid-column: 2/4;
            grid-row: 3/5;
        }
        .g1{
            background-color: rgb(238, 178, 67);
        }
        .g2{
            background-color: rgb(195, 28, 201) ;
        }
        .g3{
            background-color: rgb(18, 196, 56);
        }
        .g4{
            background-color: rgb(66, 48, 231);
        }
        .g5{
            background-color: rgb(228, 53, 53) ;
        }
        .g6{
            background-color: rgb(11, 172, 172);
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="grid g1">1</div>
        <div class="grid g2">2</div>
        <div class="grid g3">3</div>
        <div class="grid g4">4</div>
        <div class="grid g5">5</div>
        <div class="grid g6">6</div>
    </div>
</body>
</html>
