<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Design</title>
    <style>
    body{
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 70vh ;
        background-color: rgb(56, 48, 48);
    }
    .responsive-div{
        color: white;
        font-weight: bolder;
        font-size: large;
        max-width: 500px;
        background-color: blue;
        padding: 15px;
        width: 100%;
    }
    @media(max-width : 600px){
        body{
            align-items: flex-start;
        }
        .responsive-div{
            background-color: rgb(3, 3, 78);
        }
    }
    @media(min-width : 601px) and (max-width : 900px){
        .responsive-div{
            background-color: rgb(129, 129, 230);
        }
    }
    </style>
</head>
<body>
    <div class="responsive-div"> This div change their color according to screen size</div>
</body>
</html>
