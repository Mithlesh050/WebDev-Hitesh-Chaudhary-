<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heading and Lists</title>
</head>
<body>
    <h1>Heading and Lists</h1>
    <p>Unordered List</p>
    <ul>
        <li>Mango</li>
        <li>Orange</li>
    </ul>
    <p>Ordered List</p>
    <ol>
        <li>One</li>
        <li>Two</li>
    </ol>
    <div>
        <p>Block level elements</p>
        <ul>
            <li>h1 to h2</li>
            <li>ul and ol</li>
            <li>li</li>
            <li>p</li>
        </ul>
        <p>inline elements</p>
        <ul>
            <li>img</li>
            <li>a tags</li>
            <li>strong</li>
            <li>em</li>
        </ul>
        <p>This is <strong>strong</strong> tag</p>
        <p>This is <em>em</em> tag</p>
    </div>
</body>
</html>
